<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeonP</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#fff;--text:#0a0a0a;--subtext:#666;--border:#e8e8e8;--card:#f8f8f8;--input:#f0f0f0;--btn:#0a0a0a;--btnT:#fff;}
    body.dark{--bg:#0a0a0a;--text:#fff;--subtext:#888;--border:#222;--card:#111;--input:#1a1a1a;--btn:#fff;--btnT:#0a0a0a;}
    body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;transition:background .3s,color .3s;}
    body.rtl{direction:rtl;text-align:right;}
    .screen{display:none;} .screen.active{display:flex;}
    #screen-loading{flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;transform:scale(0.6);transition:all .55s cubic-bezier(0.34,1.56,0.64,1);}
    .logo-wrap.show{opacity:1;transform:scale(1);}
    .logo-title{font-size:28px;font-weight:700;letter-spacing:-1px;}
    .logo-from{position:absolute;bottom:32px;font-size:13px;color:var(--subtext);opacity:0;transition:opacity .5s .4s;}
    .logo-from.show{opacity:1;}
    .dark-toggle{position:absolute;top:16px;right:16px;background:none;border:1.5px solid var(--border);border-radius:20px;color:var(--text);padding:4px 12px;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
    body.rtl .dark-toggle{right:auto;left:16px;}
    .back-btn{position:absolute;top:16px;left:16px;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}
    body.rtl .back-btn{left:auto;right:16px;}
    #screen-login,#screen-signup,#screen-signin{flex-direction:column;align-items:center;min-height:100vh;padding:60px 24px 40px;position:relative;}
    .login-title{font-size:26px;font-weight:700;letter-spacing:-1px;}
    .login-sub{font-size:14px;color:var(--subtext);text-align:center;margin-top:6px;margin-bottom:36px;}
    .auth-btns{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;}
    .auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 20px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;cursor:pointer;font-family:Georgia,serif;font-weight:500;width:100%;transition:opacity .2s;}
    .auth-btn:hover{opacity:.8;}
    .auth-btn.primary{background:var(--btn);color:var(--btnT);border:none;font-weight:600;}
    .divider{display:flex;align-items:center;gap:10px;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-txt{color:var(--subtext);font-size:13px;}
    .terms-txt{font-size:12px;color:var(--subtext);text-align:center;line-height:1.6;}
    .terms-txt span{color:var(--text);text-decoration:underline;}
    .signup-title{font-size:22px;font-weight:700;margin:12px 0 4px;}
    .signup-sub{font-size:14px;color:var(--subtext);margin-bottom:24px;}
    .form-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
    .input-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
    .input-card input{display:block;width:100%;padding:13px 14px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .input-card input:last-child{border-bottom:none;}
    .input-card input::placeholder{color:var(--subtext);}
    .err-msg{font-size:12px;color:#e53e3e;padding-left:4px;}
    .agree-row{display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
    .checkbox{width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:1px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .checkbox.checked{background:var(--btn);border-color:var(--btn);}
    .checkbox.checked::after{content:"✓";color:var(--btnT);font-size:13px;font-weight:700;}
    .agree-txt{font-size:13px;color:var(--subtext);line-height:1.6;}
    .agree-txt span{color:var(--text);text-decoration:underline;}
    .confirm-btn{padding:14px;border-radius:12px;background:var(--btn);color:var(--btnT);border:none;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:700;width:100%;}
    .confirm-btn:disabled{background:#ddd;color:#999;cursor:not-allowed;}
    body.dark .confirm-btn:disabled{background:#333;color:#666;}
    /* FEED */
    #screen-feed{flex-direction:column;}
    .feed-wrap{max-width:600px;margin:0 auto;width:100%;display:flex;}
    .sidenav{position:fixed;top:0;width:60px;height:100vh;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;background:var(--bg);z-index:100;}
    body.rtl .sidenav{border-right:none;border-left:1px solid var(--border);right:0;left:auto;}
    .nav-btn{width:44px;height:44px;border-radius:12px;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
    .nav-btn:hover{background:var(--card);}
    .nav-btn.active{background:var(--btn);color:var(--btnT);}
    .nav-spacer{flex:1;}
    .main-feed{margin-left:60px;flex:1;border-right:1px solid var(--border);min-height:100vh;}
    body.rtl .main-feed{margin-left:0;margin-right:60px;border-right:none;border-left:1px solid var(--border);}
    .feed-header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
    .feed-title{font-size:18px;font-weight:700;}
    .compose-box{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;}
    .compose-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;font-family:Georgia,serif;padding-top:8px;resize:none;}
    .compose-input::placeholder{color:var(--subtext);}
    .post-btn{padding:7px 18px;border-radius:20px;background:var(--btn);color:var(--btnT);border:none;font-size:14px;font-family:Georgia,serif;font-weight:600;cursor:pointer;}
    .post-item{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;}}
    .avatar{width:40px;height:40px;border-radius:10px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
    .post-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
    .post-name{font-weight:700;font-size:14px;}
    .post-handle,.post-time{color:var(--subtext);font-size:13px;}
    .post-content{font-size:15px;line-height:1.5;}
    .post-actions{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;}
    .action-btn{background:none;border:none;color:var(--subtext);cursor:pointer;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;gap:4px;padding:0;transition:color .2s;}
    .action-btn:hover{color:var(--text);}
    .action-btn.liked{color:#e53e3e;}
    .reply-box{margin-top:10px;display:none;border-top:1px solid var(--border);padding-top:10px;}
    .reply-box.open{display:block;}
    .reply-input-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
    .reply-input{flex:1;background:var(--input);border:none;border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;font-family:Georgia,serif;outline:none;resize:none;}
    .reply-input::placeholder{color:var(--subtext);}
    .reply-send-btn{padding:8px 14px;border-radius:10px;background:var(--btn);color:var(--btnT);border:none;font-size:13px;cursor:pointer;font-family:Georgia,serif;font-weight:600;white-space:nowrap;}
    .reply-item{display:flex;gap:8px;padding:6px 0;border-top:1px solid var(--border);}
    .reply-avatar{width:28px;height:28px;border-radius:7px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .reply-avatar img{width:100%;height:100%;border-radius:5px;object-fit:cover;}
    .reply-name{font-weight:700;font-size:13px;}
    .reply-time{color:var(--subtext);font-size:12px;margin-left:4px;}
    .reply-text{font-size:13px;line-height:1.4;margin-top:2px;color:var(--text);}
    .cover{height:120px;background:linear-gradient(135deg,var(--btn) 0%,var(--subtext) 100%);position:relative;cursor:pointer;overflow:hidden;}
    .cover-img{width:100%;height:100%;object-fit:cover;display:none;}
    .cover:hover .cover-overlay{opacity:1;}
    .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-family:Georgia,serif;gap:6px;opacity:0;transition:opacity .2s;pointer-events:none;}
    .profile-content{padding:0 18px 40px;}
    .profile-avatar{width:72px;height:72px;border-radius:18px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:3px solid var(--bg);margin-top:-36px;overflow:hidden;cursor:pointer;position:relative;transition:opacity .2s;}
    .profile-avatar:hover{opacity:.85;}
    .profile-avatar .upload-hint{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;border-radius:15px;color:#fff;font-size:11px;text-align:center;}
    .profile-avatar:hover .upload-hint{display:flex;}
    .profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:15px;}
    .profile-name{font-weight:700;font-size:18px;margin-top:10px;}
    .profile-handle{color:var(--subtext);font-size:13px;margin-top:2px;}
    .profile-bio{font-size:14px;margin-top:8px;line-height:1.5;color:var(--text);}
    .profile-stats{display:flex;gap:16px;margin-top:14px;font-size:14px;}
    .edit-profile-btn{margin-top:14px;padding:8px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:Georgia,serif;font-weight:600;}
    .edit-profile-btn:hover{background:var(--card);}
    .pd-box{margin-top:20px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;}
    .pd-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;}
    .pd-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .pd-row:last-child{border-bottom:none;}
    .pd-label{font-size:13px;color:var(--subtext);}
    .pd-value{font-size:13px;text-align:right;max-width:60%;word-break:break-all;}
    .side-popup{position:fixed;bottom:80px;left:70px;width:180px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;}
    body.rtl .side-popup{left:auto;right:70px;}
    .side-popup.open{display:block;}
    .popup-item{width:100%;padding:10px 12px;background:none;border:none;color:var(--text);text-align:left;font-size:14px;cursor:pointer;border-radius:8px;font-family:Georgia,serif;}
    body.rtl .popup-item{text-align:right;}
    .popup-item:hover{background:var(--input);}
    .popup-item.danger{color:#e53e3e;}
    .tab-content{display:none;} .tab-content.active{display:block;}
    .loading-posts{text-align:center;padding:30px;color:var(--subtext);font-size:14px;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a0a0a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:Georgia,serif;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    body.dark .toast{background:#fff;color:#0a0a0a;}
    .toast.show{opacity:1;}
    .search-input{width:100%;padding:12px 16px;border-radius:24px;border:1.5px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .search-empty{text-align:center;padding:40px 20px;color:var(--subtext);font-size:14px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
    .modal-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .modal-input:focus{border-color:var(--text);}
    .modal-label{font-size:13px;color:var(--subtext);margin-bottom:4px;}
    .modal-save-btn{padding:14px;border-radius:12px;background:var(--btn);color:var(--btnT);border:none;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:700;width:100%;margin-top:4px;}
    .modal-cancel-btn{padding:12px;border-radius:12px;background:transparent;color:var(--subtext);border:1.5px solid var(--border);font-size:15px;cursor:pointer;font-family:Georgia,serif;width:100%;}
    .forgot-btn{background:none;border:none;color:var(--subtext);font-size:13px;cursor:pointer;font-family:Georgia,serif;margin-top:4px;}
    /* SETTINGS */
    .settings-section{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
    .settings-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;background:var(--card);}
    .settings-row{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .settings-row:last-child{border-bottom:none;}
    .settings-row:hover{background:var(--card);}
    .settings-label{font-size:14px;}
    .settings-value{font-size:13px;color:var(--subtext);}
    .lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 0;}
    .lang-btn{padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:Georgia,serif;text-align:left;transition:all .2s;}
    .lang-btn:hover{background:var(--card);}
    .lang-btn.active{background:var(--btn);color:var(--btnT);border-color:var(--btn);}
    .lang-flag{font-size:16px;margin-right:6px;}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="logo-wrap" id="logoWrap">
    <svg width="72" height="72" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="24" fill="var(--btn)"/>
      <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="var(--btnT)" letter-spacing="-2">N</text>
      <circle cx="72" cy="34" r="8" fill="var(--btnT)" opacity="0.85"/>
    </svg>
    <div class="logo-title">NeonP</div>
  </div>
  <div class="logo-from" id="logoFrom">from Plannet</div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <button class="dark-toggle" onclick="toggleDark()">🌙 Dark</button>
  <svg width="56" height="56" viewBox="0 0 100 100" fill="none" style="margin-bottom:10px;">
    <rect width="100" height="100" rx="24" fill="var(--btn)"/>
    <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="var(--btnT)" letter-spacing="-2">N</text>
    <circle cx="72" cy="34" r="8" fill="var(--btnT)" opacity="0.85"/>
  </svg>
  <div class="login-title">NeonP</div>
  <div class="login-sub" data-t="login_sub"></div>
  <div class="auth-btns">
    <button class="auth-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span data-t="google_btn"></span>
    </button>
    <button class="auth-btn" onclick="showScreen('signin')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg>
      <span data-t="email_btn"></span>
    </button>
    <div class="divider"><div class="divider-line"></div><span class="divider-txt" data-t="or"></span><div class="divider-line"></div></div>
    <button class="auth-btn primary" onclick="showScreen('signup')" data-t="create_btn"></button>
    <p class="terms-txt"><span data-t="terms_pre"></span> <span data-t="terms_link1"></span> <span data-t="terms_and"></span> <span data-t="terms_link2"></span>.</p>
  </div>
</div>

<!-- SIGNUP -->
<div id="screen-signup" class="screen">
  <button class="back-btn" onclick="showScreen('login')">←</button>
  <button class="dark-toggle" onclick="toggleDark()">🌙 Dark</button>
  <svg width="44" height="44" viewBox="0 0 100 100" fill="none" style="margin-top:10px;">
    <rect width="100" height="100" rx="24" fill="var(--btn)"/>
    <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="var(--btnT)" letter-spacing="-2">N</text>
    <circle cx="72" cy="34" r="8" fill="var(--btnT)" opacity="0.85"/>
  </svg>
  <div class="signup-title" data-t="signup_title"></div>
  <div class="signup-sub" data-t="signup_sub"></div>
  <div class="form-wrap">
    <div id="google-banner" style="display:none;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;align-items:center;gap:12px;flex-direction:row;">
      <img id="google-banner-img" src="" width="36" height="36" style="border-radius:50%;display:none;"/>
      <div><div id="google-banner-name" style="font-size:14px;font-weight:600;"></div><div id="google-banner-email" style="font-size:12px;color:var(--subtext);"></div></div>
      <svg style="margin-left:auto;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34A853" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="input-card">
      <input type="text" id="su-fname" data-ph="fname" oninput="checkSignupForm()"/>
      <input type="text" id="su-lname" data-ph="lname" oninput="checkSignupForm()"/>
      <input type="email" id="su-email" data-ph="email_ph" oninput="checkSignupForm()"/>
      <input type="password" id="su-pass" data-ph="create_pass" oninput="checkSignupForm()"/>
      <input type="password" id="su-repass" data-ph="reenter_pass" oninput="checkSignupForm()"/>
    </div>
    <div id="su-err" class="err-msg" style="display:none;"></div>
    <div class="agree-row" onclick="toggleAgree()">
      <div class="checkbox" id="agree-box"></div>
      <div class="agree-txt" data-t="agree_txt"></div>
    </div>
    <button class="confirm-btn" id="confirm-btn" disabled onclick="createAccount()" data-t="confirm_btn"></button>
    <button class="auth-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span data-t="google_signup"></span>
    </button>
  </div>
</div>

<!-- SIGN IN -->
<div id="screen-signin" class="screen">
  <button class="back-btn" onclick="showScreen('login')">←</button>
  <button class="dark-toggle" onclick="toggleDark()">🌙 Dark</button>
  <svg width="44" height="44" viewBox="0 0 100 100" fill="none" style="margin-top:10px;">
    <rect width="100" height="100" rx="24" fill="var(--btn)"/>
    <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="var(--btnT)" letter-spacing="-2">N</text>
    <circle cx="72" cy="34" r="8" fill="var(--btnT)" opacity="0.85"/>
  </svg>
  <div class="signup-title" data-t="welcome"></div>
  <div class="signup-sub" data-t="signin_sub"></div>
  <div class="form-wrap">
    <div class="input-card">
      <input type="email" id="si-email" data-ph="email_ph" oninput="checkSigninForm()"/>
      <input type="password" id="si-pass" data-ph="password_ph" oninput="checkSigninForm()"/>
    </div>
    <div id="si-err" class="err-msg" style="display:none;"></div>
    <button class="confirm-btn" id="signin-btn" disabled onclick="signInWithEmail()" data-t="signin_btn"></button>
    <button class="auth-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span data-t="google_signin"></span>
    </button>
    <button class="forgot-btn" onclick="forgotPassword()" data-t="forgot"></button>
  </div>
</div>

<!-- FEED -->
<div id="screen-feed" class="screen">
  <div class="feed-wrap">
    <nav class="sidenav">
      <div style="margin-bottom:20px;">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
          <rect width="100" height="100" rx="24" fill="var(--btn)"/>
          <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="var(--btnT)" letter-spacing="-2">N</text>
          <circle cx="72" cy="34" r="8" fill="var(--btnT)" opacity="0.85"/>
        </svg>
      </div>
      <button class="nav-btn active" id="nav-home" onclick="switchTab('home')" title="Home">⌂</button>
      <button class="nav-btn" id="nav-search" onclick="switchTab('search')" title="Search">⊘</button>
      <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')" title="Profile">◉</button>
      <div class="nav-spacer"></div>
      <button class="nav-btn" onclick="toggleDark()" title="Theme">☾</button>
      <button class="nav-btn" id="more-btn" onclick="toggleSideMenu()" title="More">···</button>
    </nav>
    <div class="side-popup" id="side-popup">
      <button class="popup-item" onclick="openSettings()">⚙️ <span data-t="settings_lbl"></span></button>
      <button class="popup-item">🔖 <span data-t="bookmarks_lbl"></span></button>
      <button class="popup-item">🔔 <span data-t="notif_lbl"></span></button>
      <button class="popup-item danger" onclick="logOut()">🚪 <span data-t="logout_lbl"></span></button>
    </div>
    <div class="main-feed">
      <div class="feed-header">
        <div class="feed-title" id="feed-title"></div>
        <div style="font-size:12px;color:var(--subtext);" id="feed-date"></div>
      </div>
      <div id="tab-home" class="tab-content active">
        <div class="compose-box">
          <div class="avatar" id="compose-avatar">YO</div>
          <div style="flex:1;">
            <textarea class="compose-input" id="compose-text" data-ph="whats_happening" rows="2"></textarea>
            <div style="display:flex;justify-content:flex-end;margin-top:8px;">
              <button class="post-btn" onclick="addPost()" data-t="post_btn"></button>
            </div>
          </div>
        </div>
        <div id="posts-container"><div class="loading-posts" data-t="loading_posts"></div></div>
      </div>
      <div id="tab-search" class="tab-content">
        <div style="padding:16px 18px;">
          <input class="search-input" id="search-input" data-ph="search_ph" oninput="searchPosts(this.value)"/>
          <div id="search-results" style="margin-top:4px;"></div>
        </div>
      </div>
      <div id="tab-profile" class="tab-content">
        <div class="cover" onclick="triggerCoverUpload()">
          <img class="cover-img" id="cover-img" src="" alt=""/>
          <div class="cover-overlay">📷 <span data-t="change_cover"></span></div>
          <input type="file" id="cover-upload" accept="image/*" style="display:none;" onchange="handleCoverUpload(event)"/>
        </div>
        <div class="profile-content">
          <div class="profile-avatar" id="profile-avatar" onclick="triggerAvatarUpload()">
            YO
            <div class="upload-hint">📷<br><span data-t="change"></span></div>
            <input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)"/>
          </div>
          <div class="profile-name" id="profile-name">Your Name</div>
          <div class="profile-handle" id="profile-handle">@you</div>
          <div class="profile-bio" id="profile-bio"></div>
          <div class="profile-stats">
            <span><strong>0</strong> <span style="color:var(--subtext)" data-t="following_lbl"></span></span>
            <span><strong id="posts-count">0</strong> <span style="color:var(--subtext)" data-t="posts_lbl"></span></span>
          </div>

            <div class="pd-row"><span class="pd-label" data-t="password_lbl"></span><span class="pd-value" id="detail-password">••••••••</span></div>
            <div class="pd-row"><span class="pd-label" data-t="login_type_lbl"></span><span class="pd-value" id="detail-logintype">—</span></div>
            <div class="pd-row"><span class="pd-label" data-t="member_since_lbl"></span><span class="pd-value" id="detail-joined">—</span></div>

        </div>

    </div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, increment, query, orderBy, onSnapshot, serverTimestamp, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDj4aolC2isMJrsU3inZupbL7gqIfKJqrA",
    authDomain: "neonp-f613a.firebaseapp.com",
    projectId: "neonp-f613a",
    storageBucket: "neonp-f613a.firebasestorage.app",
    messagingSenderId: "485756975480",
    appId: "1:485756975480:web:e21e8e79082818904bb08d"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);
  const gProvider = new GoogleAuthProvider();

  window.signInWithGoogle = async () => {
    try {
      showToast(t('connecting'));
      const r = await signInWithPopup(auth, gProvider);
      const user = r.user;
      const snap = await getDoc(doc(db,'users',user.uid));
      if (snap.exists()) { await handleUser(user,'google'); }
      else {
        window._pendingGoogleUser = user;
        const parts = (user.displayName||'').split(' ');
        document.getElementById('su-fname').value = parts[0]||'';
        document.getElementById('su-lname').value = parts.slice(1).join(' ')||'';
        const ei = document.getElementById('su-email');
        ei.style.display='none'; ei.value=user.email;
        const bn = document.getElementById('google-banner');
        bn.style.display='flex';
        document.getElementById('google-banner-name').textContent=user.displayName||'';
        document.getElementById('google-banner-email').textContent=user.email||'';
        const img=document.getElementById('google-banner-img');
        if(user.photoURL){img.src=user.photoURL;img.style.display='block';}
        agreed=false; document.getElementById('agree-box').classList.remove('checked');
        checkSignupForm(); showScreen('signup');
      }
    } catch(e){showToast('❌ '+(e.code==='auth/popup-closed-by-user'?t('popup_closed'):e.message));}
  };

  window.createAccount = async () => {
    const fn=document.getElementById('su-fname').value.trim(), ln=document.getElementById('su-lname').value.trim();
    const pass=document.getElementById('su-pass').value, err=document.getElementById('su-err');
    try {
      document.getElementById('confirm-btn').textContent=t('creating'); document.getElementById('confirm-btn').disabled=true;
      if(window._pendingGoogleUser){
        const user=window._pendingGoogleUser; window._pendingGoogleUser=null;
        document.getElementById('su-email').style.display='block';
        document.getElementById('google-banner').style.display='none';
        await handleUser(user,'google',fn+' '+ln); return;
      }
      const email=document.getElementById('su-email').value.trim();
      const r=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(r.user,{displayName:fn+' '+ln});
      await handleUser(r.user,'email');
    } catch(e){
      err.style.display='block';
      err.textContent=e.code==='auth/email-already-in-use'?t('email_exists'):e.code==='auth/weak-password'?t('weak_pass'):e.message;
      document.getElementById('confirm-btn').textContent=t('confirm_btn'); document.getElementById('confirm-btn').disabled=false;
    }
  };

  window.signInWithEmail = async () => {
    const email=document.getElementById('si-email').value.trim(), pass=document.getElementById('si-pass').value;
    const err=document.getElementById('si-err');
    try {
      document.getElementById('signin-btn').textContent=t('signing_in'); document.getElementById('signin-btn').disabled=true;
      await signInWithEmailAndPassword(auth,email,pass);
    } catch(e){
      err.style.display='block'; err.textContent='⚠️ '+t('wrong_creds');
      document.getElementById('signin-btn').textContent=t('signin_btn'); document.getElementById('signin-btn').disabled=false;
    }
  };

  window.forgotPassword = async () => {
    const email=document.getElementById('si-email').value.trim();
    if(!email){showToast(t('enter_email_first'));return;}
    try{await sendPasswordResetEmail(auth,email);showToast(t('reset_sent'));}
    catch(e){showToast('Error: '+e.message);}
  };

  window.logOut = async () => {
    await signOut(auth);
    if(window.unsubPosts)window.unsubPosts();
    toggleSideMenu(); showScreen('login'); showToast(t('logged_out'));
  };

  async function handleUser(user, loginType, overrideName) {
    const name=overrideName||user.displayName||user.email.split('@')[0];
    const uid=user.uid;
    const joined=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    const ref=doc(db,'users',uid); const snap=await getDoc(ref);
    let bio='', handle='@'+name.toLowerCase().replace(/\s+/g,'');
    if(!snap.exists()){
      await setDoc(ref,{name,email:user.email,picture:user.photoURL||'',loginType,joined,handle,bio:''});
    } else {
      const d=snap.data();
      if(d.joined)window._joined=d.joined; else window._joined=joined;
      bio=d.bio||''; handle=d.handle||handle;
    }
    window.currentUser={name,initials:getInitials(name),picture:user.photoURL||'',email:user.email,uid,loginType,joined:window._joined||joined,bio,handle};
    updateProfileUI(); showScreen('feed'); startListening();
    showToast(t('welcome_msg').replace('{name}',name.split(' ')[0]));
  }

  onAuthStateChanged(auth,user=>{
    if(user) handleUser(user,user.providerData[0]?.providerId==='google.com'?'google':'email');
    else if(document.getElementById('screen-loading').classList.contains('active')) showScreen('login');
  });

  window.savePost = async txt => {
    const u=window.currentUser;
    await addDoc(collection(db,'posts'),{content:txt,authorName:u.name,authorHandle:u.handle||('@'+u.name.toLowerCase().replace(/\s+/g,'')),authorInitials:u.initials,authorPicture:u.picture,authorEmail:u.email,authorUid:u.uid,likes:0,views:0,replyCount:0,createdAt:serverTimestamp()});
  };
  window.likePost = async(id,liked)=>await updateDoc(doc(db,'posts',id),{likes:increment(liked?-1:1)});
  window.incrementView = async id=>await updateDoc(doc(db,'posts',id),{views:increment(1)});
  window.addReply = async(postId,text)=>{
    const u=window.currentUser;
    await addDoc(collection(db,'posts',postId,'replies'),{text:text.trim(),authorName:u.name,authorHandle:u.handle||('@'+u.name.toLowerCase().replace(/\s+/g,'')),authorInitials:u.initials,authorPicture:u.picture,authorUid:u.uid,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'posts',postId),{replyCount:increment(1)});
  };
  window.loadReplies = async postId=>{
    const snap=await getDocs(query(collection(db,'posts',postId,'replies'),orderBy('createdAt','asc')));
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  };
  window.startListening = ()=>{
    if(window.unsubPosts)window.unsubPosts();
    window.unsubPosts=onSnapshot(query(collection(db,'posts'),orderBy('createdAt','desc')),snap=>{
      window.allPosts=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPosts(window.allPosts);
    });
  };
  window.saveProfileFirestore = async data=>{
    await updateDoc(doc(db,'users',window.currentUser.uid),data);
    if(data.name&&auth.currentUser) await updateProfile(auth.currentUser,{displayName:data.name});
  };
  window.doSearch = q=>{
    const lower=q.toLowerCase();
    return(window.allPosts||[]).filter(p=>(p.content||'').toLowerCase().includes(lower)||(p.authorName||'').toLowerCase().includes(lower)||(p.authorHandle||'').toLowerCase().includes(lower));
  };
</script>

let currentLang = localStorage.getItem('np_lang') || 'en_us';

function t(key) { return (LANGS[currentLang]||LANGS.en_us)[key] || LANGS.en_us[key] || key; }

function applyLang() {
  const L = LANGS[currentLang] || LANGS.en_us;
  // RTL
  document.body.classList.toggle('rtl', !!L.rtl);
  document.documentElement.setAttribute('dir', L.rtl ? 'rtl' : 'ltr');
  // data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (L[key] !== undefined) el.textContent = L[key];
  });
  // data-ph placeholders
  document.querySelectorAll('[data-ph]').forEach(el => {
    const key = el.getAttribute('data-ph');
    if (L[key] !== undefined) el.placeholder = L[key];
  });
  // Feed title
  const tab = document.querySelector('.nav-btn.active');
  if (tab) {
    const id = tab.id;
    if (id==='nav-home') document.getElementById('feed-title').textContent = L.home;
    else if (id==='nav-search') document.getElementById('feed-title').textContent = L.search_tab;
    else if (id==='nav-profile') document.getElementById('feed-title').textContent = L.profile_tab;
  }
  // Dark status
  const ds = document.getElementById('dark-status');
  if (ds) ds.textContent = isDark ? L.on : L.off;
  // Active lang button
  document.querySelectorAll('.lang-btn').forEach(b => {
    const lang = b.getAttribute('onclick').match(/'(\w+)'/)[1];
    b.classList.toggle('active', lang === currentLang);
  });
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('np_lang', lang);
  applyLang();
  showToast(t('lang_changed'));
}

function checkSignupForm() {
  const fn=document.getElementById('su-fname').value.trim(), ln=document.getElementById('su-lname').value.trim();
  const em=document.getElementById('su-email').value.trim(), pw=document.getElementById('su-pass').value, rp=document.getElementById('su-repass').value;
  const err=document.getElementById('su-err'), mis=rp.length>0&&pw!==rp;
  err.style.display=mis?'block':'none'; err.textContent=mis?t('pass_mismatch'):'';

}

  document.getElementById('compose-avatar').innerHTML=u.picture?`<img src="${u.picture}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;"/>`:(u.initials||'YO');

function renderPosts(posts, container) {
  const c=document.getElementById(container||'posts-container'); if(!c) return;
  if(!container) document.getElementById('posts-count').textContent=posts.filter(p=>p.authorUid===window.currentUser?.uid).length;
  if(!posts.length){c.innerHTML=`<div class="loading-posts">${container?t('no_results'):t('no_posts')}</div>`;return;}
  c.innerHTML=posts.map(p=>{
    const liked=!!likedPosts[p.id];
    const av=p.authorPicture?`<img src="${p.authorPicture}"/>`:(p.authorInitials||'U');
    const ti=p.createdAt?getTimeAgo(p.createdAt.toDate?p.createdAt.toDate():new Date()):'now';
    const rc=p.replyCount||0;
    return `<div class="post-item" id="post-${p.id}">
      <div class="avatar">${av}</div>
      <div style="flex:1;">
        <div class="post-meta"><span class="post-name">${escHtml(p.authorName||'User')}</span><span class="post-handle">${escHtml(p.authorHandle||'')}</span><span class="post-time">· ${ti}</span></div>
        <p class="post-content">${escHtml(p.content)}</p>
        <div class="post-actions">
          <button class="action-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}',${liked})">${liked?'♥':'♡'} ${p.likes||0}</button>
          <button class="action-btn" onclick="toggleReply('${p.id}')">💬 ${rc}</button>
          <span class="action-btn" style="cursor:default;">👁 ${p.views||0}</span>
          <button class="action-btn" onclick="sharePost()">↑ Share</button>
        </div>
        <div class="reply-box" id="reply-box-${p.id}">
          <div class="reply-input-row">
            <textarea class="reply-input" id="reply-input-${p.id}" placeholder="${t('reply_placeholder')}" rows="2"></textarea>
            <button class="reply-send-btn" onclick="submitReply('${p.id}')">${t('send_btn')||'Send'}</button>
          </div>
          <div id="replies-list-${p.id}"><div style="text-align:center;padding:10px;color:var(--subtext);font-size:13px;">${t('loading_posts')}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  if(!container) trackViews(posts);
}

function escHtml(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function trackViews(posts){
  setTimeout(()=>{posts.forEach(p=>{if(!viewedPosts[p.id]){viewedPosts[p.id]=true;localStorage.setItem('np_viewed',JSON.stringify(viewedPosts));if(window.incrementView)window.incrementView(p.id);}});},2000);
}

function getTimeAgo(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}

async function toggleLike(id,liked){likedPosts[id]=!liked;localStorage.setItem('np_liked',JSON.stringify(likedPosts));if(window.likePost)await window.likePost(id,liked);}

async function addPost(){
  const ta=document.getElementById('compose-text'),txt=ta.value.trim();
  if(!txt){showToast(t('write_something'));return;}
  ta.value='';
  if(window.savePost)await window.savePost(txt);
  showToast(t('post_done'));
}

async function toggleReply(postId){
  const box=document.getElementById('reply-box-'+postId);
  const isOpen=box.classList.contains('open');
  document.querySelectorAll('.reply-box.open').forEach(b=>b.classList.remove('open'));
  if(!isOpen){
    box.classList.add('open');
    const replies=await window.loadReplies(postId);
    renderReplies(postId,replies);
    document.getElementById('reply-input-'+postId).focus();
  }
}

function renderReplies(postId,replies){
  const c=document.getElementById('replies-list-'+postId);
  if(!replies.length){c.innerHTML=`<div style="text-align:center;padding:8px;color:var(--subtext);font-size:13px;">${t('no_replies')}</div>`;return;}
  c.innerHTML=replies.map(r=>{
    const av=r.authorPicture?`<img src="${r.authorPicture}"/>`:(r.authorInitials||'U');
    const ti=r.createdAt?getTimeAgo(r.createdAt.toDate?r.createdAt.toDate():new Date()):'now';
    return `<div class="reply-item"><div class="reply-avatar">${av}</div><div style="flex:1;"><span class="reply-name">${escHtml(r.authorName||'User')}</span><span class="reply-time">· ${ti}</span><div class="reply-text">${escHtml(r.text)}</div></div></div>`;
  }).join('');
}

async function submitReply(postId){
  const input=document.getElementById('reply-input-'+postId);
  const txt=input.value.trim(); if(!txt)return;
  input.value='';
  await window.addReply(postId,txt);
  const replies=await window.loadReplies(postId);
  renderReplies(postId,replies);
  showToast(t('reply_done'));
}

function searchPosts(q){
  const r=document.getElementById('search-results');
  if(!q.trim()){r.innerHTML=`<div class="search-empty">${t('search_hint')}</div>`;return;}
  const results=window.doSearch?window.doSearch(q):[];
  if(!results.length){r.innerHTML=`<div class="search-empty">❌ "${escHtml(q)}" — ${t('no_results')}</div>`;return;}
  renderPosts(results,'search-results');
}

  const titles={home:t('home'),search:t('search_tab'),profile:t('profile_tab')};

}

function triggerCoverUpload(){document.getElementById('cover-upload').click();}
function handleCoverUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=document.getElementById('cover-img');
    img.src=ev.target.result; img.style.display='block';
    localStorage.setItem('np_cover_'+window.currentUser?.uid,ev.target.result);
    showToast(t('cover_saved'));
  };
  reader.readAsDataURL(file);
}

function triggerAvatarUpload(){document.getElementById('avatar-upload').click();}
function handleAvatarUpload(e){
  const file=e.target.files[0]; if(!file) return;
  if(file.size>2*1024*1024){showToast(t('img_too_large'));return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const imgData=ev.target.result;
    const pa=document.getElementById('profile-avatar');
    pa.innerHTML=`<img src="${imgData}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"/><div class="upload-hint">📷<br>${t('change')}</div><input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)"/>`;
    document.getElementById('compose-avatar').innerHTML=`<img src="${imgData}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;"/>`;
    localStorage.setItem('np_avatar_'+window.currentUser?.uid,imgData);
    window.currentUser.picture=imgData;
    showToast(t('avatar_saved'));
  };
  reader.readAsDataURL(file);
}

function loadSavedImages(){
  const uid=window.currentUser?.uid; if(!uid) return;
  const savedAvatar=localStorage.getItem('np_avatar_'+uid);
  if(savedAvatar){
    const pa=document.getElementById('profile-avatar');
    pa.innerHTML=`<img src="${savedAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"/><div class="upload-hint">📷<br>${t('change')}</div><input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)"/>`;
    document.getElementById('compose-avatar').innerHTML=`<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;"/>`;
    window.currentUser.picture=savedAvatar;
  }
  const savedCover=localStorage.getItem('np_cover_'+uid);
  if(savedCover){const ci=document.getElementById('cover-img');if(ci){ci.src=savedCover;ci.style.display='block';}}
}

function toggleSideMenu(){document.getElementById('side-popup').classList.toggle('open');}
function showToast(msg){const t2=document.getElementById('toast');t2.textContent=msg;t2.classList.add('show');setTimeout(()=>t2.classList.remove('show'),2500);}
document.addEventListener('click',e=>{const p=document.getElementById('side-popup'),b=document.getElementById('more-btn');if(p&&!p.contains(e.target)&&b&&!b.contains(e.target))p.classList.remove('open');});
</script>
</body>
</html>
