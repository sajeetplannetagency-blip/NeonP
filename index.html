<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeonP</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#fff;--text:#0a0a0a;--subtext:#666;--border:#e8e8e8;--card:#f8f8f8;--input:#f0f0f0;--btn:#0a0a0a;--btnT:#fff;}
    body.dark{--bg:#0a0a0a;--text:#fff;--subtext:#888;--border:#222;--card:#111;--input:#1a1a1a;--btn:#fff;--btnT:#0a0a0a;}
    body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;transition:background .3s,color .3s;}
    body.rtl{direction:rtl;text-align:right;}
    .screen{display:none;} .screen.active{display:flex;}
    #screen-loading{flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;transform:scale(0.6);transition:all .55s cubic-bezier(0.34,1.56,0.64,1);}
    .logo-wrap.show{opacity:1;transform:scale(1);}
    .logo-title{font-size:28px;font-weight:700;letter-spacing:-1px;}
    .logo-from{position:absolute;bottom:32px;font-size:13px;color:var(--subtext);opacity:0;transition:opacity .5s .4s;}
    .logo-from.show{opacity:1;}
    .dark-toggle{position:absolute;top:16px;right:16px;background:none;border:1.5px solid var(--border);border-radius:20px;color:var(--text);padding:4px 12px;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
    body.rtl .dark-toggle{right:auto;left:16px;}
    .back-btn{position:absolute;top:16px;left:16px;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}
    body.rtl .back-btn{left:auto;right:16px;}
    #screen-login,#screen-signup,#screen-signin{flex-direction:column;align-items:center;min-height:100vh;padding:60px 24px 40px;position:relative;}
    .login-title{font-size:26px;font-weight:700;letter-spacing:-1px;}
    .login-sub{font-size:14px;color:var(--subtext);text-align:center;margin-top:6px;margin-bottom:36px;}
    .auth-btns{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;}
    .auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 20px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;cursor:pointer;font-family:Georgia,serif;font-weight:500;width:100%;transition:opacity .2s;}
    .auth-btn:hover{opacity:.8;}
    .auth-btn.primary{background:var(--btn);color:var(--btnT);border:none;font-weight:600;}
    .divider{display:flex;align-items:center;gap:10px;}
    .divider-line{flex:1;height:1px;background:var(--border);}
    .divider-txt{color:var(--subtext);font-size:13px;}
    .terms-txt{font-size:12px;color:var(--subtext);text-align:center;line-height:1.6;}
    .terms-txt span{color:var(--text);text-decoration:underline;}
    .signup-title{font-size:22px;font-weight:700;margin:12px 0 4px;}
    .signup-sub{font-size:14px;color:var(--subtext);margin-bottom:24px;}
    .form-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
    .input-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
    .input-card input{display:block;width:100%;padding:13px 14px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .input-card input:last-child{border-bottom:none;}
    .input-card input::placeholder{color:var(--subtext);}
    .err-msg{font-size:12px;color:#e53e3e;padding-left:4px;}
    .agree-row{display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
    .checkbox{width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:1px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .checkbox.checked{background:var(--btn);border-color:var(--btn);}
    .checkbox.checked::after{content:"✓";color:var(--btnT);font-size:13px;font-weight:700;}
    .agree-txt{font-size:13px;color:var(--subtext);line-height:1.6;}
    .agree-txt span{color:var(--text);text-decoration:underline;}
    .confirm-btn{padding:14px;border-radius:12px;background:var(--btn);color:var(--btnT);border:none;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:700;width:100%;}
    .confirm-btn:disabled{background:#ddd;color:#999;cursor:not-allowed;}
    body.dark .confirm-btn:disabled{background:#333;color:#666;}
    /* FEED */
    #screen-feed{flex-direction:column;}
    .feed-wrap{max-width:600px;margin:0 auto;width:100%;display:flex;}
    .sidenav{position:fixed;top:0;width:60px;height:100vh;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;background:var(--bg);z-index:100;}
    body.rtl .sidenav{border-right:none;border-left:1px solid var(--border);right:0;left:auto;}
    .nav-btn{width:44px;height:44px;border-radius:12px;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
    .nav-btn:hover{background:var(--card);}
    .nav-btn.active{background:var(--btn);color:var(--btnT);}
    .nav-spacer{flex:1;}
    .main-feed{margin-left:60px;flex:1;border-right:1px solid var(--border);min-height:100vh;}
    body.rtl .main-feed{margin-left:0;margin-right:60px;border-right:none;border-left:1px solid var(--border);}
    .feed-header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
    .feed-title{font-size:18px;font-weight:700;}
    .compose-box{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;}
    .compose-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:16px;font-family:Georgia,serif;padding-top:8px;resize:none;}
    .compose-input::placeholder{color:var(--subtext);}
    .post-btn{padding:7px 18px;border-radius:20px;background:var(--btn);color:var(--btnT);border:none;font-size:14px;font-family:Georgia,serif;font-weight:600;cursor:pointer;}
    .post-item{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;}}
    .avatar{width:40px;height:40px;border-radius:10px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
    .post-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
    .post-name{font-weight:700;font-size:14px;}
    .post-handle,.post-time{color:var(--subtext);font-size:13px;}
    .post-content{font-size:15px;line-height:1.5;}
    .post-actions{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;}
    .action-btn{background:none;border:none;color:var(--subtext);cursor:pointer;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;gap:4px;padding:0;transition:color .2s;}
    .action-btn:hover{color:var(--text);}
    .action-btn.liked{color:#e53e3e;}
    .reply-box{margin-top:10px;display:none;border-top:1px solid var(--border);padding-top:10px;}
    .reply-box.open{display:block;}
    .reply-input-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
    .reply-input{flex:1;background:var(--input);border:none;border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;font-family:Georgia,serif;outline:none;resize:none;}
    .reply-input::placeholder{color:var(--subtext);}
    .reply-send-btn{padding:8px 14px;border-radius:10px;background:var(--btn);color:var(--btnT);border:none;font-size:13px;cursor:pointer;font-family:Georgia,serif;font-weight:600;white-space:nowrap;}
    .reply-item{display:flex;gap:8px;padding:6px 0;border-top:1px solid var(--border);}
    .reply-avatar{width:28px;height:28px;border-radius:7px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;overflow:hidden;}
    .reply-avatar img{width:100%;height:100%;border-radius:5px;object-fit:cover;}
    .reply-name{font-weight:700;font-size:13px;}
    .reply-time{color:var(--subtext);font-size:12px;margin-left:4px;}
    .reply-text{font-size:13px;line-height:1.4;margin-top:2px;color:var(--text);}
    .cover{height:120px;background:linear-gradient(135deg,var(--btn) 0%,var(--subtext) 100%);position:relative;cursor:pointer;overflow:hidden;transition:height .3s ease;}
    .cover-img{width:100%;height:100%;object-fit:cover;display:none;}
    .cover:hover .cover-overlay{opacity:1;}
    .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-family:Georgia,serif;gap:6px;opacity:0;transition:opacity .2s;pointer-events:none;}
    .cover-overlay-desktop{position:absolute;bottom:16px;right:20px;display:none;align-items:center;gap:8px;}
    .cover-upload-btn-desktop{background:rgba(0,0,0,.65);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:Georgia,serif;font-weight:600;display:flex;align-items:center;gap:6px;transition:background .2s;}
    .cover-upload-btn-desktop:hover{background:rgba(0,0,0,.85);}

    /* Desktop banner — YouTube style */
    .desktop-mode .cover{
      height:260px !important;
      border-radius:0 !important;
    }
    .desktop-mode .cover-overlay{
      pointer-events:auto;
    }
    .desktop-mode .cover-overlay-desktop{
      display:flex !important;
    }

    .desktop-mode .profile-name{font-size:24px !important;margin-top:12px !important;}
    .desktop-mode .profile-handle{font-size:15px !important;}
    .desktop-mode .profile-content{padding:0 24px 40px !important;}
    /* Banner hint text changes */
    .desktop-mode .cover-overlay .cover-simple-hint{display:none;}
    .cover-simple-hint{display:inline;}
    .profile-content{padding:0 18px 40px;}
    .profile-avatar{width:72px;height:72px;border-radius:18px;background:var(--btn);color:var(--btnT);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;border:3px solid var(--bg);margin-top:-36px;overflow:hidden;cursor:pointer;position:relative;transition:opacity .2s;}
    .profile-avatar:hover{opacity:.85;}
    .profile-avatar .upload-hint{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;border-radius:15px;color:#fff;font-size:11px;text-align:center;}
    .profile-avatar:hover .upload-hint{display:flex;}
    .profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:15px;}
    .profile-name{font-weight:700;font-size:18px;margin-top:10px;}
    .profile-handle{color:var(--subtext);font-size:13px;margin-top:2px;}
    .profile-bio{font-size:14px;margin-top:8px;line-height:1.5;color:var(--text);}
    .profile-stats{display:flex;gap:16px;margin-top:14px;font-size:14px;}
    .edit-profile-btn{margin-top:14px;padding:8px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:Georgia,serif;font-weight:600;}
    .edit-profile-btn:hover{background:var(--card);}
    .pd-box{margin-top:20px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;}
    .pd-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;}
    .pd-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .pd-row:last-child{border-bottom:none;}
    .pd-label{font-size:13px;color:var(--subtext);}
    .pd-value{font-size:13px;text-align:right;max-width:60%;word-break:break-all;}
    .side-popup{position:fixed;bottom:80px;left:70px;width:180px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;}
    body.rtl .side-popup{left:auto;right:70px;}
    .side-popup.open{display:block;}
    .popup-item{width:100%;padding:10px 12px;background:none;border:none;color:var(--text);text-align:left;font-size:14px;cursor:pointer;border-radius:8px;font-family:Georgia,serif;}
    body.rtl .popup-item{text-align:right;}
    .popup-item:hover{background:var(--input);}
    .popup-item.danger{color:#e53e3e;}
    .tab-content{display:none;} .tab-content.active{display:block;}
    .loading-posts{text-align:center;padding:30px;color:var(--subtext);font-size:14px;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a0a0a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:Georgia,serif;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    body.dark .toast{background:#fff;color:#0a0a0a;}
    .toast.show{opacity:1;}
    .search-input{width:100%;padding:12px 16px;border-radius:24px;border:1.5px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .search-empty{text-align:center;padding:40px 20px;color:var(--subtext);font-size:14px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:4px;}
    .modal-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;}
    .modal-input:focus{border-color:var(--text);}
    .modal-label{font-size:13px;color:var(--subtext);margin-bottom:4px;}
    .modal-save-btn{padding:14px;border-radius:12px;background:var(--btn);color:var(--btnT);border:none;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:700;width:100%;margin-top:4px;}
    .modal-cancel-btn{padding:12px;border-radius:12px;background:transparent;color:var(--subtext);border:1.5px solid var(--border);font-size:15px;cursor:pointer;font-family:Georgia,serif;width:100%;}
    .forgot-btn{background:none;border:none;color:var(--subtext);font-size:13px;cursor:pointer;font-family:Georgia,serif;margin-top:4px;}
    
    /* SCHEDULE + BOOKMARK */
    .schedule-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--subtext);font-size:13px;cursor:pointer;font-family:Georgia,serif;transition:all .2s;}
    .schedule-btn:hover{background:var(--card);color:var(--text);}
    .schedule-btn.scheduled{color:#7c3aed;border-color:#7c3aed;}
    .action-btn.bookmarked{color:#f59e0b;}
    .scheduled-badge{display:inline-flex;align-items:center;gap:5px;background:#7c3aed18;color:#7c3aed;border-radius:20px;padding:3px 10px;font-size:12px;margin-top:6px;}
    .datetime-input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--input);color:var(--text);font-size:15px;font-family:Georgia,serif;outline:none;margin-top:4px;}
    .datetime-input:focus{border-color:var(--text);}
    .schedule-preview{background:var(--card);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--subtext);margin-top:4px;display:none;}
    .schedule-preview.show{display:block;}
    /* BOOKMARKS PAGE */
    .bookmarks-empty{text-align:center;padding:40px 20px;color:var(--subtext);font-size:14px;}
    /* SCHEDULED POSTS indicator */
    .scheduled-post-bar{background:linear-gradient(90deg,#7c3aed18,transparent);border-left:3px solid #7c3aed;padding:6px 10px;margin-bottom:4px;border-radius:0 8px 8px 0;font-size:12px;color:#7c3aed;display:flex;align-items:center;gap:5px;}
    /* ── MEDIA UPLOAD & DISPLAY ── */
    .compose-media-bar{display:flex;gap:8px;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:8px;align-items:center;}
    .media-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--subtext);font-size:13px;cursor:pointer;font-family:Georgia,serif;transition:all .2s;}
    .media-btn:hover{background:var(--card);color:var(--text);}

    /* Compose previews */
    .media-preview-wrap{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
    .media-preview-item{position:relative;border-radius:12px;overflow:hidden;background:#000;display:inline-block;}
    .media-preview-item img{display:block;max-width:100%;max-height:260px;object-fit:contain;border-radius:12px;}
    .media-preview-item video{display:block;max-width:100%;max-height:260px;border-radius:12px;}
    .media-remove-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.72);color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;}

    /* Upload progress */
    .upload-progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;display:none;}
    .upload-progress-fill{height:100%;background:var(--btn);transition:width .25s;}

    /* Post media — preserves original ratio */
    .post-media-wrap{margin-top:10px;border-radius:14px;overflow:hidden;background:#000;}

    /* Single media */
    .post-media-single{width:100%;position:relative;}
    .post-media-single img{
      width:100%;
      display:block;
      object-fit:contain;
      background:#000;
      max-height:560px;   /* tall portrait fits, wide landscape fits */
      cursor:pointer;
    }
    .post-media-single video{width:100%;display:block;max-height:560px;background:#000;}

    /* 2 media side by side */
    .post-media-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .post-media-grid-2 img,.post-media-grid-2 video{width:100%;height:260px;object-fit:cover;display:block;cursor:pointer;}

    /* 3 media: top full, bottom two */
    .post-media-grid-3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;}
    .post-media-grid-3 .span-full{grid-column:1/3;}
    .post-media-grid-3 img,.post-media-grid-3 video{width:100%;height:210px;object-fit:cover;display:block;cursor:pointer;}

    /* 4 media 2x2 */
    .post-media-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .post-media-grid-4 img,.post-media-grid-4 video{width:100%;height:210px;object-fit:cover;display:block;cursor:pointer;}

    /* Video wrapper with fullscreen btn */
    .video-item-wrap{position:relative;background:#000;}
    .video-item-wrap video{width:100%;display:block;}
    .video-item-wrap.grid-video video{height:210px;object-fit:cover;}
    .fullscreen-btn{
      position:absolute;bottom:10px;right:10px;
      background:rgba(0,0,0,.62);border:none;color:#fff;
      border-radius:8px;padding:5px 10px;font-size:12px;
      cursor:pointer;display:flex;align-items:center;gap:5px;
      backdrop-filter:blur(6px);font-family:Georgia,serif;
      transition:background .2s;z-index:4;
    }
    .fullscreen-btn:hover{background:rgba(0,0,0,.85);}

    /* Lightbox */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;display:none;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox-img-wrap{max-width:100vw;max-height:100vh;display:flex;align-items:center;justify-content:center;}
    .lightbox-img-wrap img{max-width:100vw;max-height:100vh;object-fit:contain;display:block;}
    .lightbox-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;backdrop-filter:blur(8px);}
    .lb-prev{left:12px;} .lb-next{right:12px;}

    /* SETTINGS */
    .settings-section{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
    .settings-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;background:var(--card);}
    .settings-row{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .settings-row:last-child{border-bottom:none;}
    .settings-row:hover{background:var(--card);}
    .settings-label{font-size:14px;}
    .settings-value{font-size:13px;color:var(--subtext);}
    .lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 0;}
    .lang-btn.active{background:var(--btn)!important;color:var(--btnT)!important;font-weight:700;}
    .lang-btn{padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:Georgia,serif;text-align:left;transition:all .2s;}
    .lang-btn:hover{background:var(--card);}
    .lang-btn.active{background:var(--btn);color:var(--btnT);border-color:var(--btn);}
    .lang-flag{font-size:16px;margin-right:6px;}
  
    /* ═══════════════════════════════════════════
       DESKTOP RESPONSIVE — X/Twitter/Instagram style
       Mobile: <1024px  |  Desktop: ≥1024px
    ═══════════════════════════════════════════ */

    /* NAV LABELS — hidden on mobile */
    .nav-label{display:none;font-size:15px;font-weight:500;font-family:Georgia,serif;}
    .nav-logo-text{display:none;font-size:20px;font-weight:700;letter-spacing:-0.5px;}
    .nav-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 4px;}
    .nav-post-btn{display:none;} /* hidden on mobile */
    .right-sidebar{display:none;} /* hidden on mobile */

    /* ── DESKTOP ── */
    /* Desktop triggered by JS class 'desktop-mode' on body */
    /* Also triggers at 900px+ for real desktop browsers */
    @media (min-width:900px), body.desktop-mode {
      .feed-wrap{
        width:100%;
        max-width:100%;
        margin:0;
      }
    }

    body.desktop-mode .feed-wrap,
    @media (min-width:900px) { .feed-wrap {
      display:flex;
      width:100%;
      max-width:100%;
      min-height:100vh;
    }}

    .desktop-mode .feed-wrap{
      display:flex !important;
      width:100% !important;
      max-width:100% !important;
    }

    /* LEFT NAV — desktop */
    .desktop-mode .sidenav{
      width:220px !important;
      align-items:flex-start !important;
      padding:12px !important;
      position:sticky !important;
      top:0 !important;
      height:100vh !important;
      overflow-y:auto !important;
      flex-shrink:0 !important;
    }
    .desktop-mode .nav-logo-text{display:block !important;}
    .desktop-mode .nav-label{display:block !important;}
    .desktop-mode .nav-icon{font-size:20px;width:26px;text-align:center;}
    .desktop-mode .nav-btn{
      width:100% !important;
      justify-content:flex-start !important;
      gap:14px !important;
      padding:11px 16px !important;
      border-radius:30px !important;
      font-size:15px !important;
      height:auto !important;
    }
    .desktop-mode .nav-spacer{flex:1 !important;}
    .desktop-mode .nav-post-btn{
      display:flex !important;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:13px 20px;
      border-radius:30px;
      background:var(--btn);
      color:var(--btnT);
      border:none;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      font-family:Georgia,serif;
      margin-bottom:8px;
      transition:opacity .2s;
    }
    .desktop-mode .nav-post-btn:hover{opacity:.85;}

    /* MAIN FEED — desktop center */
    .desktop-mode .main-feed{
      margin-left:0 !important;
      margin-right:0 !important;
      flex:1 !important;
      max-width:none !important;
      border-right:1px solid var(--border) !important;
      min-height:100vh !important;
    }

    /* RIGHT SIDEBAR — desktop */
    .desktop-mode .right-sidebar{
      display:flex !important;
      flex-direction:column;
      gap:16px;
      width:320px;
      min-width:280px;
      flex-shrink:0;
      padding:16px 16px;
      position:sticky;
      top:0;
      height:100vh;
      overflow-y:auto;
    }

    /* Popup reposition */
    .desktop-mode .side-popup{
      left:230px !important;
      bottom:60px !important;
      width:220px !important;
    }

    /* Sticky feed header glass blur */
    .desktop-mode .feed-header{
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    /* Feed header shows username on desktop */
    .desktop-mode .feed-user-chip{display:flex !important;}

    /* Dashboard tab */
    .desktop-mode #nav-dashboard{display:flex !important;}

    /* Large screen */
    @media (min-width:1400px){
      .desktop-mode .sidenav{width:260px !important;}
      .desktop-mode .right-sidebar{width:370px !important;}
    }

    /* RIGHT SIDEBAR COMPONENTS */
    .rs-search-wrap{position:relative;}
    .rs-search{
      width:100%;
      padding:11px 16px 11px 40px;
      border-radius:24px;
      border:1.5px solid var(--border);
      background:var(--input);
      color:var(--text);
      font-size:14px;
      font-family:Georgia,serif;
      outline:none;
      transition:border-color .2s;
    }
    .rs-search:focus{border-color:var(--text);background:var(--bg);}
    .rs-search-wrap::before{
      content:"🔍";
      position:absolute;
      left:12px;top:50%;transform:translateY(-50%);
      font-size:14px;pointer-events:none;
    }
    .rs-card{
      background:var(--card);
      border-radius:16px;
      padding:16px;
      border:1px solid var(--border);
    }
    .rs-card-title{font-weight:700;font-size:16px;margin-bottom:12px;}
    .rs-trend-item{
      padding:8px 0;
      border-bottom:1px solid var(--border);
      cursor:pointer;
      transition:background .15s;
    }
    .rs-trend-item:last-child{border-bottom:none;}
    .rs-trend-item:hover .rs-trend-tag{text-decoration:underline;}
    .rs-trend-cat{font-size:11px;color:var(--subtext);}
    .rs-trend-tag{font-weight:700;font-size:14px;margin:2px 0;}
    .rs-trend-count{font-size:12px;color:var(--subtext);}
    .rs-user-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
    .rs-follow-btn{
      padding:6px 14px;border-radius:20px;
      background:var(--btn);color:var(--btnT);
      border:none;font-size:13px;cursor:pointer;
      font-family:Georgia,serif;font-weight:600;
      white-space:nowrap;transition:opacity .2s;
    }
    .rs-follow-btn:hover{opacity:.8;}
    .rs-footer{font-size:12px;color:var(--subtext);line-height:1.8;padding:4px 0 20px;}
    .rs-scheduled-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .rs-scheduled-item:last-child{border-bottom:none;}
    .rs-search-post-result{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
    .rs-search-post-result:hover{opacity:.7;}
    .rs-search-post-result:last-child{border-bottom:none;}

  
    /* ── DASHBOARD ── */
    .dash-stat-card{
      background:var(--card);
      border:1.5px solid var(--border);
      border-radius:16px;
      padding:18px 16px;
      text-align:center;
      transition:transform .2s, box-shadow .2s;
      cursor:default;
    }
    .dash-stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.08);}
    .dash-stat-num{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;}
    .dash-stat-label{font-size:12px;color:var(--subtext);text-transform:uppercase;letter-spacing:0.5px;}
    .dash-section{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;}
    .dash-section-title{font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .dash-post-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .dash-post-row:last-child{border-bottom:none;}
    .dash-post-text{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .dash-post-stat{font-size:13px;color:var(--subtext);white-space:nowrap;display:flex;align-items:center;gap:12px;}
    .dash-activity-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .dash-activity-row:last-child{border-bottom:none;}
    .dash-activity-icon{font-size:18px;width:28px;text-align:center;}
    .dash-activity-time{font-size:12px;color:var(--subtext);margin-left:auto;}
    .dash-empty{text-align:center;padding:20px;color:var(--subtext);font-size:13px;}

  </style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, increment, query, orderBy, onSnapshot, serverTimestamp, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDj4aolC2isMJrsU3inZupbL7gqIfKJqrA",
    authDomain: "neonp-f613a.firebaseapp.com",
    projectId: "neonp-f613a",
    storageBucket: "neonp-f613a.firebasestorage.app",
    messagingSenderId: "485756975480",
    appId: "1:485756975480:web:e21e8e79082818904bb08d"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);
  const gProvider = new GoogleAuthProvider();

  // ── Upload media to Cloudinary (free, no credit card) ──
  window.uploadMediaFile = async (dataUrl, fileName, onProgress) => {
    const CLOUD = 'dfubgcuaf';
    const PRESET = 'neonp_uploads';

    // Convert dataUrl to blob
    const res = await fetch(dataUrl);
    const blob = await res.blob();

    const formData = new FormData();
    formData.append('file', blob, fileName);
    formData.append('upload_preset', PRESET);
    formData.append('folder', 'neonp_posts');

    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      const isVideo = blob.type.startsWith('video/');
      const url = `https://api.cloudinary.com/v1_1/${CLOUD}/${isVideo ? 'video' : 'image'}/upload`;

      xhr.open('POST', url);
      xhr.upload.onprogress = e => {
        if (e.lengthComputable && onProgress) {
          onProgress(Math.round(e.loaded / e.total * 100));
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          resolve(data.secure_url);
        } else {
          reject(new Error('Upload failed: ' + xhr.responseText));
        }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(formData);
    });
  };

  window.signInWithGoogle = async () => {
    try {
      showToast(t('connecting'));
      const r = await signInWithPopup(auth, gProvider);
      const user = r.user;
      const snap = await getDoc(doc(db,'users',user.uid));
      if (snap.exists()) { await handleUser(user,'google'); }
      else {
        window._pendingGoogleUser = user;
        const parts = (user.displayName||'').split(' ');
        document.getElementById('su-fname').value = parts[0]||'';
        document.getElementById('su-lname').value = parts.slice(1).join(' ')||'';
        const ei = document.getElementById('su-email');
        ei.style.display='none'; ei.value=user.email;
        const bn = document.getElementById('google-banner');
        bn.style.display='flex';
        document.getElementById('google-banner-name').textContent=user.displayName||'';
        document.getElementById('google-banner-email').textContent=user.email||'';
        const img=document.getElementById('google-banner-img');
        if(user.photoURL){img.src=user.photoURL;img.style.display='block';}
        agreed=false; document.getElementById('agree-box').classList.remove('checked');
        checkSignupForm(); showScreen('signup');
      }
    } catch(e){showToast('❌ '+(e.code==='auth/popup-closed-by-user'?t('popup_closed'):e.message));}
  };

  window.createAccount = async () => {
    const fn=document.getElementById('su-fname').value.trim(), ln=document.getElementById('su-lname').value.trim();
    const pass=document.getElementById('su-pass').value, err=document.getElementById('su-err');
    try {
      document.getElementById('confirm-btn').textContent=t('creating'); document.getElementById('confirm-btn').disabled=true;
      if(window._pendingGoogleUser){
        const user=window._pendingGoogleUser; window._pendingGoogleUser=null;
        document.getElementById('su-email').style.display='block';
        document.getElementById('google-banner').style.display='none';
        await handleUser(user,'google',fn+' '+ln); return;
      }
      const email=document.getElementById('su-email').value.trim();
      const r=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(r.user,{displayName:fn+' '+ln});
      await handleUser(r.user,'email');
    } catch(e){
      err.style.display='block';
      err.textContent=e.code==='auth/email-already-in-use'?t('email_exists'):e.code==='auth/weak-password'?t('weak_pass'):e.message;
      document.getElementById('confirm-btn').textContent=t('confirm_btn'); document.getElementById('confirm-btn').disabled=false;
    }
  };

  window.signInWithEmail = async () => {
    const email=document.getElementById('si-email').value.trim(), pass=document.getElementById('si-pass').value;
    const err=document.getElementById('si-err');
    try {
      document.getElementById('signin-btn').textContent=t('signing_in'); document.getElementById('signin-btn').disabled=true;
      await signInWithEmailAndPassword(auth,email,pass);
    } catch(e){
      err.style.display='block'; err.textContent='⚠️ '+t('wrong_creds');
      document.getElementById('signin-btn').textContent=t('signin_btn'); document.getElementById('signin-btn').disabled=false;
    }
  };

  window.forgotPassword = async () => {
    const email=document.getElementById('si-email').value.trim();
    if(!email){showToast(t('enter_email_first'));return;}
    try{await sendPasswordResetEmail(auth,email);showToast(t('reset_sent'));}
    catch(e){showToast('Error: '+e.message);}
  };

  window.logOut = async () => {
    await signOut(auth);
    if(window.unsubPosts)window.unsubPosts();
    toggleSideMenu(); showScreen('login'); showToast(t('logged_out'));
  };

  async function handleUser(user, loginType, overrideName) {
    const name=overrideName||user.displayName||user.email.split('@')[0];
    const uid=user.uid;
    const joined=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    const ref=doc(db,'users',uid); const snap=await getDoc(ref);
    let bio='', handle='@'+name.toLowerCase().replace(/\s+/g,'');
    if(!snap.exists()){
      await setDoc(ref,{name,email:user.email,picture:user.photoURL||'',loginType,joined,handle,bio:''});
    } else {
      const d=snap.data();
      if(d.joined)window._joined=d.joined; else window._joined=joined;
      bio=d.bio||''; handle=d.handle||handle;
    }
    window.currentUser={name,initials:getInitials(name),picture:user.photoURL||'',email:user.email,uid,loginType,joined:window._joined||joined,bio,handle};
    updateProfileUI(); showScreen('feed'); startListening();
    showToast(t('welcome_msg').replace('{name}',name.split(' ')[0]));
  }

  onAuthStateChanged(auth,user=>{
    if(user) handleUser(user,user.providerData[0]?.providerId==='google.com'?'google':'email');
    else if(document.getElementById('screen-loading').classList.contains('active')) showScreen('login');
  });

  window.savePost = async (txt, mediaArr) => {
    const u = window.currentUser;
    const bar = document.getElementById('upload-progress-bar');
    const fill = document.getElementById('upload-progress-fill');

    const mediaForFirestore = [];

    if ((mediaArr||[]).length > 0) {
      bar.style.display = 'block';
      for (let i = 0; i < mediaArr.length; i++) {
        const m = mediaArr[i];
        // Detect real extension from file mime

        try {
          const url = await window.uploadMediaFile(m.data, path, pct => {
            const overall = ((i / mediaArr.length) + (pct / 100 / mediaArr.length)) * 100;
            fill.style.width = overall + '%';
            showToast(`Uploading ${i+1}/${mediaArr.length} — ${pct}%`);
          });
          // Store URL + type only — NO data, full original quality on Firebase CDN
          mediaForFirestore.push({ type: m.type, url });
        } catch(err) {
          bar.style.display = 'none';
          showToast('Upload failed: ' + err.message);
          return;
        }
      }
      fill.style.width = '100%';
      setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 600);
    }

    await addDoc(collection(db,'posts'), {
      content: txt||'',
      authorName: u.name,
      authorHandle: u.handle||('@'+u.name.toLowerCase().replace(/\s+/g,'')),
      authorInitials: u.initials,
      authorPicture: u.picture,
      authorEmail: u.email,
      authorUid: u.uid,
      likes: 0, views: 0, replyCount: 0,
      media: mediaForFirestore,
      createdAt: serverTimestamp()
    });
  };
  window.likePost = async(id,liked)=>await updateDoc(doc(db,'posts',id),{likes:increment(liked?-1:1)});
  window.incrementView = async id=>await updateDoc(doc(db,'posts',id),{views:increment(1)});
  window.addReply = async(postId,text)=>{
    const u=window.currentUser;
    await addDoc(collection(db,'posts',postId,'replies'),{text:text.trim(),authorName:u.name,authorHandle:u.handle||('@'+u.name.toLowerCase().replace(/\s+/g,'')),authorInitials:u.initials,authorPicture:u.picture,authorUid:u.uid,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'posts',postId),{replyCount:increment(1)});
  };
  window.loadReplies = async postId=>{
    const snap=await getDocs(query(collection(db,'posts',postId,'replies'),orderBy('createdAt','asc')));
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  };
  window.startListening = ()=>{
    if(window.unsubPosts)window.unsubPosts();
    window.unsubPosts=onSnapshot(query(collection(db,'posts'),orderBy('createdAt','desc')),snap=>{
      window.allPosts=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPosts(window.allPosts);
    });
  };
  window.saveProfileFirestore = async data=>{
    await updateDoc(doc(db,'users',window.currentUser.uid),data);
    if(data.name&&auth.currentUser) await updateProfile(auth.currentUser,{displayName:data.name});
  };
  window.doSearch = q=>{
    const lower=q.toLowerCase();
    return(window.allPosts||[]).filter(p=>(p.content||'').toLowerCase().includes(lower)||(p.authorName||'').toLowerCase().includes(lower)||(p.authorHandle||'').toLowerCase().includes(lower));
  };

// LANGUAGE ENGINE
// ═══════════════════════════════════════════
let currentLang = localStorage.getItem('np_lang') || 'en_us';

function t(key) { return (LANGS[currentLang]||LANGS.en_us)[key] || LANGS.en_us[key] || key; }

function applyLang() {
  if(typeof updateLogoLetter === 'function') updateLogoLetter(currentLang);
  const L = LANGS[currentLang] || LANGS.en_us;
  // RTL
  document.body.classList.toggle('rtl', !!L.rtl);
  document.documentElement.setAttribute('dir', L.rtl ? 'rtl' : 'ltr');
  // data-t elements — always update, all languages have all keys via fillLangFallbacks
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    el.textContent = L[key] || LANGS.en_us[key] || key;
  });
  // data-ph placeholders
  document.querySelectorAll('[data-ph]').forEach(el => {
    const key = el.getAttribute('data-ph');
    el.placeholder = L[key] || LANGS.en_us[key] || '';
  });
  // Feed title
  const tab = document.querySelector('.nav-btn.active');
  if (tab) {
    const id = tab.id;
    if (id==='nav-home') document.getElementById('feed-title').textContent = L.home;
    else if (id==='nav-search') document.getElementById('feed-title').textContent = L.search_tab;
    else if (id==='nav-profile') document.getElementById('feed-title').textContent = L.profile_tab;
  }
  // Dark status
  const ds = document.getElementById('dark-status');
  if (ds) ds.textContent = isDark ? L.on : L.off;
  // Active lang button
  document.querySelectorAll('.lang-btn').forEach(b => {
    const lang = b.getAttribute('onclick').match(/'(\w+)'/)[1];
    b.classList.toggle('active', lang === currentLang);
  });
}

function updateLogoLetter(lang) {
  // Try direct match first, then strip trailing digits (or2->or, as2->as)

  document.querySelectorAll('[id^="logo-letter-"]').forEach(el => {
    el.textContent = letter;

function fillLangFallbacks(){
  const base = LANGS.en_us;
  const baseKeys = Object.keys(base).filter(k=>k!=='name'&&k!=='flag'&&k!=='rtl'&&k!=='_fallback');
  Object.keys(LANGS).forEach(code => {
    if(code === 'en_us') return;
    const L = LANGS[code];
    if(!L) return;
    baseKeys.forEach(key => {
      if(!L[key]) L[key] = base[key];
    });
  });
}

function renderPosts(posts, container) {
  const c=document.getElementById(container||'posts-container'); if(!c) return;
  if(!container) document.getElementById('posts-count').textContent=posts.filter(p=>p.authorUid===window.currentUser?.uid).length;
  if(!posts.length){c.innerHTML=`<div class="loading-posts">${container?t('no_results'):t('no_posts')}</div>`;return;}
  c.innerHTML=posts.map(p=>{
    const liked=!!likedPosts[p.id];
    const bookmarked=!!(window._bookmarks&&window._bookmarks[p.id]);
    const av=p.authorPicture?`<img src="${p.authorPicture}"/>`:(p.authorInitials||'U');
    const ti=p.createdAt?getTimeAgo(p.createdAt.toDate?p.createdAt.toDate():new Date()):'now';
    const rc=p.replyCount||0;
    return `<div class="post-item" id="post-${p.id}">
      <div class="avatar">${av}</div>
      <div style="flex:1;">
        <div class="post-meta"><span class="post-name">${escHtml(p.authorName||'User')}</span><span class="post-handle">${escHtml(p.authorHandle||'')}</span><span class="post-time">· ${ti}</span></div>
        ${p.content ? `<p class="post-content">${escHtml(p.content)}</p>` : ''}
        ${renderMediaGrid(p.media||[])}
        ${p.scheduledFor ? `<div class="scheduled-post-bar"><span data-t="schedule_btn"></span>d for ${formatScheduleTime(p.scheduledFor)}</div>` : ''}
        <div class="post-actions">
          <button class="action-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}',${liked})">${liked?'♥':'♡'} ${p.likes||0}</button>
          <button class="action-btn" onclick="toggleReply('${p.id}')">💬 ${rc}</button>
          <span class="action-btn" style="cursor:default;">👁 ${p.views||0}</span>
          <button class="action-btn" onclick="sharePost()">↑ Share</button>
          <button class="action-btn ${bookmarked?'bookmarked':''}" onclick="toggleBookmark('${p.id}')" style="margin-left:auto;">${bookmarked?'🔖':'🔖'}</button>
        </div>
        <div class="reply-box" id="reply-box-${p.id}">
          <div class="reply-input-row">
            <textarea class="reply-input" id="reply-input-${p.id}" placeholder="${t('reply_placeholder')}" rows="2"></textarea>
            <button class="reply-send-btn" onclick="submitReply('${p.id}')">${t('send_btn')||'Send'}</button>
          </div>
          <div id="replies-list-${p.id}"><div style="text-align:center;padding:10px;color:var(--subtext);font-size:13px;">${t('loading_posts')}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  if(!container) { trackViews(posts); setTimeout(buildTrending, 200); if(isDesktopMode) setTimeout(renderDashboard, 300); }
}

function getTimeAgo(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}

async function toggleLike(id,liked){likedPosts[id]=!liked;localStorage.setItem('np_liked',JSON.stringify(likedPosts));if(window.likePost)await window.likePost(id,liked);}

async function addPost(){
  const ta=document.getElementById('compose-text'), txt=ta.value.trim();
  if(!txt && window._pendingMedia.length===0){showToast(t('write_something'));return;}

  // If scheduled
  if (window._scheduledTime) {
    const sp = {
      content: txt,
      media: [...window._pendingMedia],
      scheduledFor: window._scheduledTime,
      authorName: window.currentUser?.name,
      authorHandle: window.currentUser?.handle,
      id: 'sched_' + Date.now()
    };
    window._scheduledPosts.push(sp);
    localStorage.setItem('np_scheduled', JSON.stringify(window._scheduledPosts));
    ta.value='';
    window._pendingMedia=[];
    document.getElementById('media-preview-wrap').innerHTML='';
    clearSchedule();
    showToast(`<span data-t="schedule_btn"></span>d for ${formatScheduleTime(sp.scheduledFor)}!`);
    return;
  }

  ta.value='';
  const mediaToSend = [...window._pendingMedia];
  window._pendingMedia = [];
  document.getElementById('media-preview-wrap').innerHTML='';
  if(window.savePost) await window.savePost(txt, mediaToSend);
  showToast(t('post_done'));
}

// Build language grid dynamically
function buildLangGrid(filter='') {
  const grid = document.getElementById('lang-grid');
  if (!grid) return;
  const q = filter.toLowerCase();

  // Priority order — English US & UK always on top, then rest alphabetically
  const priorityFirst = ['en_us','en_uk'];
  const allEntries = Object.entries(LANGS);
  const priority = priorityFirst.map(c => [c, LANGS[c]]).filter(([c,v])=>v);
  const rest = allEntries.filter(([c])=>!priorityFirst.includes(c))
    .sort((a,b)=>(a[1].name||a[0]).localeCompare(b[1].name||b[0]));
  const ordered = [...priority, ...rest];

  const filtered = q
    ? ordered.filter(([k,v]) => (v.name||'').toLowerCase().includes(q) || k.includes(q))
    : ordered;

  grid.innerHTML = filtered.map(([code, lang]) => {
    const isActive = code === currentLang;
    return `<button class="lang-btn ${isActive?'active':''}" onclick="setLang('${code}')">
      <span class="lang-flag">${lang.flag||'🌐'}</span>${lang.name||code}
    </button>`;
  }).join('');
}

function filterLangs(q) { buildLangGrid(q); }

function triggerCoverUpload(){document.getElementById('cover-upload').click();}
function handleCoverClick(){
  // On desktop, only the button triggers upload (not whole banner click)
  // On mobile, whole banner is clickable
  if(!isDesktopMode) triggerCoverUpload();
}
function handleCoverUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=document.getElementById('cover-img');
    img.src=ev.target.result; img.style.display='block';
    localStorage.setItem('np_cover_'+window.currentUser?.uid,ev.target.result);
    showToast(t('cover_saved'));
  };
  reader.readAsDataURL(file);
}

function triggerAvatarUpload(){document.getElementById('avatar-upload').click();}
function handleAvatarUpload(e){
  const file=e.target.files[0]; if(!file) return;
  if(file.size>2*1024*1024){showToast(t('img_too_large'));return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const imgData=ev.target.result;
    const pa=document.getElementById('profile-avatar');
    pa.innerHTML=`<img src="${imgData}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"/><div class="upload-hint">📷<br>${t('change')}</div><input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)"/>`;
    document.getElementById('compose-avatar').innerHTML=`<img src="${imgData}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;"/>`;
    localStorage.setItem('np_avatar_'+window.currentUser?.uid,imgData);
    window.currentUser.picture=imgData;
    showToast(t('avatar_saved'));
  };
  reader.readAsDataURL(file);
}

function loadSavedImages(){
  const uid=window.currentUser?.uid; if(!uid) return;
  const savedAvatar=localStorage.getItem('np_avatar_'+uid);
  if(savedAvatar){
    const pa=document.getElementById('profile-avatar');
    pa.innerHTML=`<img src="${savedAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;"/><div class="upload-hint">📷<br>${t('change')}</div><input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)"/>`;
    document.getElementById('compose-avatar').innerHTML=`<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;"/>`;

window._pendingMedia = [];  // [{type:'image'|'video', data:dataURL, file:File}]
window._lbImages = [];      // for lightbox nav
window._lbIndex = 0;

function triggerMediaUpload(type) {
  const input = document.getElementById('media-upload-input');
  if (type === 'image') input.accept = 'image/*';
  else if (type === 'video') input.accept = 'video/*';
  else input.accept = 'image/*,video/*';
  input.multiple = true;
  input.click();
}

function handleMediaUpload(e) {
  const files = Array.from(e.target.files);
  const remaining = 4 - window._pendingMedia.length;
  if (remaining <= 0) { showToast('Max 4 items per post!'); return; }
  files.slice(0, remaining).forEach(file => {
    const isVideo = file.type.startsWith('video/');
    const reader = new FileReader();
    reader.onload = ev => {
      window._pendingMedia.push({
        type: isVideo ? 'video' : 'image',
        data: ev.target.result,   // full original quality dataURL
        file: file
      });
      renderComposePreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderComposePreviews() {
  const wrap = document.getElementById('media-preview-wrap');
  wrap.innerHTML = window._pendingMedia.map((m, i) => `
    <div class="media-preview-item">
      ${m.type === 'video'
        ? `<video src="${m.data}" style="max-height:220px;max-width:100%;border-radius:12px;" muted playsinline></video>`
        : `<img src="${m.data}" style="max-height:220px;max-width:100%;border-radius:12px;display:block;"/>`
      }
      <button class="media-remove-btn" onclick="removeMedia(${i})">✕</button>
    </div>`
  ).join('');
}

function removeMedia(i) {
  window._pendingMedia.splice(i, 1);
  renderComposePreviews();
}

// ── Render post media grid (X/Twitter style, original ratios) ──
function renderMediaGrid(media) {
  if (!media || !media.length) return '';
  const count = Math.min(media.length, 4);
  const items = media.slice(0, 4);

  // Build each media element
  function mediaEl(m, idx, extraClass='', gridMode=false) {
    if (m.type === 'video') {
      return `<div class="video-item-wrap${gridMode?' grid-video':''} ${extraClass}">
        <video src="${m.url}" ${gridMode?'style="height:210px;object-fit:cover;"':''} controls playsinline preload="metadata"></video>
        <button class="fullscreen-btn" onclick="openVideoFS(this)">⛶ Fullscreen</button>
      </div>`;
    } else {
      return `<img
        src="${m.url}"
        class="${extraClass}"
        style="${gridMode?'height:210px;object-fit:cover;':'max-height:560px;width:100%;object-fit:contain;background:#000;'}"
        onclick="openLightbox(${JSON.stringify(items.map(x=>x.url).filter(u=>u))}, ${idx})"
        loading="lazy"
      />`;
    }
  }

  let inner = '';
  if (count === 1) {
    inner = `<div class="post-media-single">${mediaEl(items[0], 0, '', false)}</div>`;
  } else if (count === 2) {
    inner = `<div class="post-media-grid-2">${items.map((m,i)=>mediaEl(m,i,'',true)).join('')}</div>`;
  } else if (count === 3) {
    inner = `<div class="post-media-grid-3">
      ${mediaEl(items[0],0,'span-full',true)}
      ${mediaEl(items[1],1,'',true)}
      ${mediaEl(items[2],2,'',true)}
    </div>`;
  } else {
    inner = `<div class="post-media-grid-4">${items.map((m,i)=>mediaEl(m,i,'',true)).join('')}</div>`;
  }

  return `<div class="post-media-wrap">${inner}</div>`;
}

// ── Lightbox with nav ──
function openLightbox(urls, index) {
  window._lbImages = urls;
  window._lbIndex = index || 0;
  _showLbImage();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function _showLbImage() {
  const img = document.getElementById('lightbox-img');
  const urls = window._lbImages;
  img.src = urls[window._lbIndex] || '';
  document.getElementById('lb-prev').style.display = urls.length > 1 ? 'flex' : 'none';
  document.getElementById('lb-next').style.display = urls.length > 1 ? 'flex' : 'none';
}
function lbNav(dir) {
  const len = window._lbImages.length;
  window._lbIndex = (window._lbIndex + dir + len) % len;
  _showLbImage();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});
// tap outside image to close
document.getElementById('lightbox').addEventListener('click', function(e){
  if(e.target===this) closeLightbox();
});

// ── Video fullscreen ──
function openVideoFS(btn) {
  const video = btn.closest('.video-item-wrap').querySelector('video');
  if (video.requestFullscreen) video.requestFullscreen();
  else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
  else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
}

window._bookmarks = JSON.parse(localStorage.getItem('np_bookmarks') || '{}');

function toggleBookmark(postId) {
  if (window._bookmarks[postId]) {
    delete window._bookmarks[postId];
    showToast(t('bookmark_removed'));
  } else {
    // Save full post data
    const post = (window.allPosts||[]).find(p=>p.id===postId);
    if (post) window._bookmarks[postId] = post;
    showToast(t('bookmark_added'));
  }
  localStorage.setItem('np_bookmarks', JSON.stringify(window._bookmarks));
  // Re-render to update button color
  if (window.allPosts) renderPosts(window.allPosts);
}

function renderBookmarksPage() {
  const c = document.getElementById('bookmarks-container');
  const saved = Object.values(window._bookmarks || {});
  if (!saved.length) {
    c.innerHTML = '<div class="bookmarks-empty">🔖<br><br><span data-t="bookmarks_empty"></span><br><span style="font-size:13px;" data-t="bookmarks_empty_sub"></span></div>';
    return;
  }
  renderPosts(saved, 'bookmarks-container');
}

// ══════════════════════════════════════════
// SCHEDULE POST
// ══════════════════════════════════════════
window._scheduledTime = null;
window._scheduledPosts = JSON.parse(localStorage.getItem('np_scheduled') || '[]');

function openScheduleModal() {
  // Set min datetime to now
  const now = new Date();
  now.setMinutes(now.getMinutes() + 5);
  const minStr = now.toISOString().slice(0,16);
  document.getElementById('schedule-datetime').min = minStr;
  // If already scheduled, show that time
  if (window._scheduledTime) {
    document.getElementById('schedule-datetime').value = new Date(window._scheduledTime).toISOString().slice(0,16);
    previewSchedule();
  }
  document.getElementById('schedule-modal').classList.add('open');
}

function closeScheduleModal() {
  document.getElementById('schedule-modal').classList.remove('open');
}

function closeScheduleOnOverlay(e) {
  if (e.target === document.getElementById('schedule-modal')) closeScheduleModal();
}

function setQuickSchedule(hours) {
  const t2 = new Date(Date.now() + hours * 3600 * 1000);
  document.getElementById('schedule-datetime').value = t2.toISOString().slice(0,16);
  previewSchedule();
}

function previewSchedule() {
  const val = document.getElementById('schedule-datetime').value;
  const preview = document.getElementById('schedule-preview');
  if (!val) { preview.classList.remove('show'); return; }
  const d = new Date(val);
  const now = new Date();
  const diffMs = d - now;
  const diffHrs = Math.round(diffMs / 3600000);
  const diffMins = Math.round(diffMs / 60000);
  let relText = '';
  if (diffMins < 60) relText = `in ${diffMins} minutes`;
  else if (diffHrs < 24) relText = `in ${diffHrs} hours`;
  else relText = `in ${Math.round(diffHrs/24)} days`;
  preview.innerHTML = `📅 Will be posted on <strong>${d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}</strong> at <strong>${d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</strong> <span style="color:var(--subtext)">(${relText})</span>`;
  preview.classList.add('show');
}

function confirmSchedule() {
  const val = document.getElementById('schedule-datetime').value;
  if (!val) { showToast('Please pick a date & time!'); return; }
  const d = new Date(val);
  if (d <= new Date()) { showToast('Please pick a future time!'); return; }
  window._scheduledTime = d.getTime();
  // Update badge
  const badge = document.getElementById('schedule-set-badge');
  document.getElementById('schedule-badge-text').textContent = formatScheduleTime(window._scheduledTime);
  badge.style.display = 'flex';
  document.getElementById('schedule-toggle-btn').classList.add('scheduled');
  closeScheduleModal();
  showToast('<span data-t="schedule_btn"></span>d! Post when ready.');
  updateScheduledSidebar();
}

function clearSchedule() {
  window._scheduledTime = null;
  document.getElementById('schedule-set-badge').style.display = 'none';
  document.getElementById('schedule-toggle-btn').classList.remove('scheduled');
  showToast(t('schedule_cleared'));
}

function formatScheduleTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' at ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

// Check scheduled posts every minute
function checkScheduledPosts() {
  const now = Date.now();
  let changed = false;
  window._scheduledPosts = window._scheduledPosts.filter(sp => {
    if (sp.scheduledFor <= now) {
      // Time to post!
      if (window.savePost) window.savePost(sp.content, sp.media || []);
      showToast('<span data-t="schedule_btn"></span>d post published!');
      changed = true;
      return false;
    }
    return true;
  });
  if (changed) localStorage.setItem('np_scheduled', JSON.stringify(window._scheduledPosts));
}
setInterval(checkScheduledPosts, 60000);

function focusCompose() {
  switchTab('home');
  setTimeout(() => {
    const ta = document.getElementById('compose-text');
    if (ta) { ta.focus(); ta.scrollIntoView({behavior:'smooth', block:'center'}); }

// Right sidebar search
function rsSearch(q) {
  const res = document.getElementById('rs-search-results');
  if (!q.trim()) { res.innerHTML = ''; return; }
  const results = window.doSearch ? window.doSearch(q) : [];
  if (!results.length) {
    res.innerHTML = '<div style="padding:8px 0;font-size:13px;color:var(--subtext);">No results</div>';
    return;
  }
  res.innerHTML = results.slice(0,5).map(p => `
    <div class="rs-search-post-result" onclick="switchTab('home')">
      <div style="font-weight:600;font-size:13px;">${escHtml(p.authorName||'')}</div>
      <div style="font-size:13px;color:var(--subtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml((p.content||'').slice(0,60))}${p.content?.length>60?'...':''}</div>
    </div>`).join('');
}

// Build trending from actual posts
function buildTrending() {
  const posts = window.allPosts || [];
  const wordCount = {};
  const stopWords = new Set(['the','a','an','is','in','on','at','to','for','of','and','or','but','it','this','that','was','are','be','as','by','from','with','i','my','me','we','you','he','she','they','have','has','had','not','no','so','do','did','can','will','if','up','out','about','what','how','when','there','just','more','also','get','been','its','into','than','then','only','over','after','back','other','our','your','her','his','their','all','would','could','should','one','two','new','now','very','still','here','some','any','who','which','were','through']);
  posts.forEach(p => {
    (p.content||'').toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).forEach(w => {
      if (w.length > 3 && !stopWords.has(w)) wordCount[w] = (wordCount[w]||0) + 1;
    });
  });
  const sorted = Object.entries(wordCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const c = document.getElementById('rs-trending');
  if (!c) return;
  if (!sorted.length) {
    c.innerHTML = '<div style="font-size:13px;color:var(--subtext);padding:8px 0;">Post something to see trends!</div>';
    return;
  }
  c.innerHTML = sorted.map(([word, count], i) => `
    <div class="rs-trend-item" onclick="document.getElementById('rs-search-input')&&(document.getElementById('rs-search-input').value='${word}',rsSearch('${word}'))">
      <div class="rs-trend-cat">Trending · #${i+1}</div>
      <div class="rs-trend-tag">#${word}</div>
      <div class="rs-trend-count">${count} post${count>1?'s':''}</div>
    </div>`).join('');
}

// Update scheduled posts sidebar
function updateScheduledSidebar() {
  const card = document.getElementById('rs-scheduled-card');
  const list = document.getElementById('rs-scheduled-list');
  if (!card || !list) return;
  const scheduled = window._scheduledPosts || [];
  if (!scheduled.length) { card.style.display='none'; return; }
  card.style.display='block';
  list.innerHTML = scheduled.map((sp,i) => `
    <div class="rs-scheduled-item">
      <div style="font-size:12px;color:#7c3aed;">🕐 ${formatScheduleTime(sp.scheduledFor)}</div>
      <div style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml((sp.content||'(media post)').slice(0,50))}</div>
      <button onclick="cancelScheduledPost(${i})" style="background:none;border:none;color:var(--subtext);font-size:11px;cursor:pointer;margin-top:2px;">✕ Cancel</button>
    </div>`).join('');
}

function cancelScheduledPost(i) {
  window._scheduledPosts.splice(i,1);
  localStorage.setItem('np_scheduled', JSON.stringify(window._scheduledPosts));
  updateScheduledSidebar();
  showToast('Scheduled post cancelled');
}

// ── DESKTOP MODE — PURE AUTO DETECT ──
// Logic:
// Real desktop/laptop = innerWidth >= 900 AND no touch → desktop mode
// Mobile Chrome normal = narrow viewport → mobile mode  
// Mobile Chrome "Desktop site" ON = viewport becomes 900px+ → desktop mode
// No manual toggle — fully automatic!

let isDesktopMode = false;

function applyDesktopMode(on) {
  isDesktopMode = on;
  document.body.classList.toggle('desktop-mode', on);

  // Show/hide dashboard nav
  const dashNav = document.getElementById('nav-dashboard');
  if (dashNav) dashNav.style.display = on ? 'flex' : 'none';

  if (on) {
    buildTrending();
    updateScheduledSidebar();
  }
}

function initDesktop() {
  // Detect desktop:
  // 1. Wide viewport (real desktop OR mobile "Request Desktop Site")
  // 2. innerWidth >= 900px = desktop layout
  // Mobile normal Chrome = ~360-430px → mobile
  // Mobile Chrome "Desktop Site" ON = ~980-1280px → desktop
  // Real laptop/PC = always wide → desktop
  const isWide = window.innerWidth >= 900;
  applyDesktopMode(isWide);
}

// Re-check on resize (covers desktop site toggle)
window.addEventListener('resize', () => {
  const shouldBeDesktop = window.innerWidth >= 900;
  if (shouldBeDesktop !== isDesktopMode) {
    applyDesktopMode(shouldBeDesktop);
  }
});

// ── DASHBOARD ──
function renderDashboard() {
  const myPosts = (window.allPosts||[]).filter(p => p.authorUid === window.currentUser?.uid);
  const allPosts = window.allPosts || [];

  // Stats
  const totalLikes = myPosts.reduce((s,p)=>s+(p.likes||0),0);
  const totalViews = myPosts.reduce((s,p)=>s+(p.views||0),0);
  const totalReplies = myPosts.reduce((s,p)=>s+(p.replyCount||0),0);
  const bookmarkCount = Object.keys(window._bookmarks||{}).length;
  const scheduledCount = (window._scheduledPosts||[]).length;

  const setEl = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  setEl('ds-posts', myPosts.length);
  setEl('ds-likes', totalLikes);
  setEl('ds-views', totalViews);
  setEl('ds-replies', totalReplies);
  setEl('ds-bookmarks', bookmarkCount);
  setEl('ds-scheduled', scheduledCount);

  // Top posts by likes
  const topPosts = [...myPosts].sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,5);
  const topEl = document.getElementById('dash-top-posts');
  if (topEl) {
    if (!topPosts.length) {
      topEl.innerHTML = '<div class="dash-empty">No posts yet! Start posting 🚀</div>';
    } else {
      topEl.innerHTML = topPosts.map((p,i) => `
        <div class="dash-post-row">
          <div style="font-size:18px;font-weight:700;color:var(--subtext);width:24px;">${i+1}</div>
          <div class="dash-post-text">${escHtml((p.content||'(media)').slice(0,60))}</div>
          <div class="dash-post-stat">
            <span>♥ ${p.likes||0}</span>
            <span>👁 ${p.views||0}</span>
            <span>💬 ${p.replyCount||0}</span>
          </div>
        </div>`).join('');
    }
  }

  // Recent activity — all posts timeline
  const recent = [...allPosts].slice(0,8);
  const actEl = document.getElementById('dash-activity');
  if (actEl) {
    if (!recent.length) {
      actEl.innerHTML = '<div class="dash-empty">No activity yet!</div>';
    } else {
      actEl.innerHTML = recent.map(p => {
        const isMe = p.authorUid === window.currentUser?.uid;
        const time = p.createdAt ? getTimeAgo(p.createdAt.toDate ? p.createdAt.toDate() : new Date()) : 'now';
        return `<div class="dash-activity-row">
          <div class="dash-activity-icon">${isMe ? '✏️' : '👤'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:13px;">${escHtml(p.authorName||'')}</div>
            <div style="font-size:12px;color:var(--subtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml((p.content||'(media post)').slice(0,50))}</div>
          </div>
          <div class="dash-activity-time">${time}</div>
        </div>`;
      }).join('');
    }
  }

  // Media stats
  const mediaPosts = allPosts.filter(p => p.media && p.media.length > 0);
  const imgCount = mediaPosts.reduce((s,p)=>s+p.media.filter(m=>m.type==='image').length,0);
  const vidCount = mediaPosts.reduce((s,p)=>s+p.media.filter(m=>m.type==='video').length,0);
  const mediaEl = document.getElementById('dash-media-stats');
  if (mediaEl) {
    mediaEl.innerHTML = `
      <div class="dash-post-row">
        <div style="font-size:20px;">🖼️</div>
        <div class="dash-post-text" data-t="dash_img"></div>
        <div class="dash-post-stat"><strong>${imgCount}</strong></div>
      </div>
      <div class="dash-post-row">
        <div style="font-size:20px;">🎬</div>
        <div class="dash-post-text" data-t="dash_vid"></div>
        <div class="dash-post-stat"><strong>${vidCount}</strong></div>
      </div>
      <div class="dash-post-row">
        <div style="font-size:20px;">📎</div>
        <div class="dash-post-text" data-t="dash_media_total"></div>
        <div class="dash-post-stat"><strong>${mediaPosts.length}</strong></div>
      </div>`;
  }
}

// Update trending when posts load
const _origRenderPosts = window.renderPostsOrig || null;

// Keyboard shortcuts (desktop)
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'n' || e.key === 'N') focusCompose();
  if (e.key === 'h' || e.key === 'H') switchTab('home');
  if (e.key === 's' || e.key === 'S') switchTab('search');
  if (e.key === 'p' || e.key === 'P') switchTab('profile');
  if (e.key === 'b' || e.key === 'B') switchTab('bookmarks');
});

// Resize handler
window.addEventListener('resize', () => {
  if (window.innerWidth >= 1024) {
    buildTrending();
    updateScheduledSidebar();
  }
});
